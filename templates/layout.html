<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmployeeSync AI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #6366f1;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 2rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            position: fixed;
            height: 100vh;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-left: 0.5rem;
        }

        .logo span { color: var(--text-main); }

        nav {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        nav a:hover {
            background: #f8fafc;
            color: var(--primary);
        }

        nav a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            margin-left: 260px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.75rem; font-weight: 700; color: var(--text-main); }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--secondary);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pill {
            padding: 0.375rem 0.875rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-on-time { background: #d1fae5; color: #065f46; }
        .status-left { background: #e2e8f0; color: #475569; }
        .status-late-arrival { background: #fee2e2; color: #991b1b; }
        .status-early-leaving { background: #fffbeb; color: #92400e; }
        .status-present { background: #d1fae5; color: #065f46; }
        .status-late { background: #fee2e2; color: #991b1b; }


        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border-left: 4px solid var(--primary);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z" fill="currentColor"/>
                <path d="M12 6C9.79 6 8 7.79 8 10C8 12.21 9.79 14 12 14C14.21 14 16 12.21 16 10C16 7.79 14.21 6 12 6ZM12 12C10.9 12 10 11.1 10 10C10 8.9 10.9 8 10 8C11.1 8 12 8.9 12 10C12 11.1 11.1 12 12 12Z" fill="currentColor"/>
            </svg>
            <span>EmployeeSync</span>
        </div>
        <nav>
            <a href="{{ url_for('index') }}" class="{% if request.path == url_for('index') %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('employees') }}" class="{% if request.path == url_for('employees') %}active{% endif %}">Directory</a>
            <a href="{{ url_for('attendance') }}" class="{% if request.path == url_for('attendance') %}active{% endif %}">Logs</a>
        </nav>
    </aside>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <div id="toast" class="notification">
        <div style="font-weight: 700; color: var(--primary); margin-bottom: 0.25rem;">Attendance Captured!</div>
        <div id="toast-msg" style="font-size: 0.875rem; color: var(--text-muted);"></div>
    </div>

    <script>
        const socket = io();
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');

        socket.on('new_attendance', (data) => {
            toastMsg.innerText = `${data.name} marked as ${data.status} at ${data.time}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
            
            // Refresh table if on index or attendance page
            if (window.location.pathname === '/' || window.location.pathname === '/attendance') {
                setTimeout(() => { location.reload(); }, 2000);
            }
        });
    </script>
</body>
</html>
